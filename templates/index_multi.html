<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Farm Professional Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root{
--bg:#0f172a;--card:#1e293b;--text:#fff;--muted:#cbd5e1;
--green:#22c55e;--red:#ef4444;--blue:#38bdf8;--orange:#f97316;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:Arial}
.header{display:flex;justify-content:space-between;padding:20px;flex-wrap:wrap}
.title{font-size:32px;font-weight:bold}
.container{padding:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:16px}
.card{background:var(--card);padding:20px;border-radius:16px}
.value{font-size:36px;font-weight:bold}
.on{color:var(--green)} .off{color:var(--red)}
.temp{color:var(--orange)} .hum{color:var(--blue)}
.controls,.table-wrap,.chart-wrap{background:var(--card);padding:20px;border-radius:16px;margin-top:20px}
select,input,button{padding:10px;border-radius:8px;border:1px solid #334155;background:#0b1220;color:white}
button{cursor:pointer}
table{width:100%;border-collapse:collapse}
th,td{padding:10px;border-bottom:1px solid #334155;text-align:left}
.status-online{color:var(--green)}
.status-offline{color:var(--red)}
.footer{text-align:center;padding:20px;color:#94a3b8}
</style>
</head>
<body>
<div class="header">
<div class="title">SMART FARM PROFESSIONAL DASHBOARD</div>
<div id="systemStatus" class="status-online">SYSTEM ONLINE</div>
</div>

<div class="container">

<div class="controls">
<h3>Device & Filter</h3>
<select id="device_filter"></select>
<select id="period">
<option value="1">1 Hour</option>
<option value="6">6 Hours</option>
<option value="12">12 Hours</option>
<option value="24" selected>24 Hours</option>
<option value="168">7 Days</option>
</select>
<input type="datetime-local" id="start_date">
<input type="datetime-local" id="end_date">
<button onclick="loadData()">Apply</button>
</div>

<div class="grid">
<div class="card"><h3>Temperature</h3><div id="temperature" class="value temp">0°C</div></div>
<div class="card"><h3>Humidity</h3><div id="humidity" class="value hum">0%</div></div>
<div class="card"><h3>Relay</h3><div id="relay" class="value off">OFF</div></div>
<div class="card"><h3>Sensor</h3><div id="sensor_status" class="value">-</div></div>
<div class="card"><h3>Device</h3><div id="device_name">-</div><div id="device_status">-</div></div>
<div class="card"><h3>Config</h3><div>Mode: <span id="active_mode">-</span></div><div>Low: <span id="active_low">-</span></div><div>High: <span id="active_high">-</span></div></div>
</div>

<div class="controls">
<h3>Control Device</h3>
<select id="mode">
<option value="AUTO">AUTO</option>
<option value="MANUAL">MANUAL</option>
</select>
<input id="low_temp" type="number" placeholder="Low Temp">
<input id="high_temp" type="number" placeholder="High Temp">
<button onclick="saveConfig()">Save Config</button>
</div>

<div class="chart-wrap">
<canvas id="chart"></canvas>
</div>

<div class="table-wrap">
<h3>History</h3>
<table>
<thead>
<tr>
<th>Time</th>
<th>Device</th>
<th>Temp</th>
<th>Humidity</th>
<th>Relay</th>
<th>Status</th>
</tr>
</thead>
<tbody id="historyBody"></tbody>
</table>
</div>

</div>

<div class="footer">ESP32 • Flask • SQLite • Multi Device</div>

<script>
let selectedDevice="";

const chart=new Chart(document.getElementById("chart"),{
type:"line",
data:{labels:[],datasets:[
{label:"Temperature",data:[]},
{label:"Humidity",data:[]}
]}
});

async function loadDevices(){
const r=await fetch("/devices");
const devices=await r.json();
const sel=document.getElementById("device_filter");
const current=sel.value;
sel.innerHTML="";
devices.forEach(d=>{
let o=document.createElement("option");
o.value=d.device_id;
o.text=d.device_name||d.device_id;
sel.appendChild(o);
});
if(current) sel.value=current;
if(!sel.value && devices.length) sel.value=devices[0].device_id;
selectedDevice=sel.value;
}

async function loadConfig(){
if(!selectedDevice) return;
const r=await fetch("/esp32/"+selectedDevice);
const c=await r.json();
active_mode.innerText=c.mode||"-";
active_low.innerText=c.low_temp||"-";
active_high.innerText=c.high_temp||"-";
mode.value=c.mode||"AUTO";
low_temp.value=c.low_temp||"";
high_temp.value=c.high_temp||"";
}

async function loadStatus(){
if(!selectedDevice) return;
const r=await fetch("/device_status/"+selectedDevice);
const d=await r.json();
device_status.innerText=d.status;
}

async function loadData(){
selectedDevice=document.getElementById("device_filter").value;
if(!selectedDevice) return;

let url="/history?device="+selectedDevice+"&period="+period.value;
if(start_date.value && end_date.value){
url="/history?device="+selectedDevice+"&start="+start_date.value+"&end="+end_date.value;
}

const r=await fetch(url);
const data=await r.json();
if(!data.length) return;

const last=data[data.length-1];

temperature.innerText=last.temperature+"°C";
humidity.innerText=last.humidity+"%";
relay.innerText=last.relay==1?"ON":"OFF";
relay.className=last.relay==1?"value on":"value off";
sensor_status.innerText=last.sensor_status;
device_name.innerText=last.device_name||last.device_id;

chart.data.labels=data.map(x=>x.created_at);
chart.data.datasets[0].data=data.map(x=>x.temperature);
chart.data.datasets[1].data=data.map(x=>x.humidity);
chart.update();

const tb=document.getElementById("historyBody");
tb.innerHTML="";
data.slice(-100).reverse().forEach(row=>{
tb.innerHTML += `<tr>
<td>${row.created_at}</td>
<td>${row.device_name||row.device_id}</td>
<td>${row.temperature}</td>
<td>${row.humidity}</td>
<td>${row.relay}</td>
<td>${row.sensor_status}</td>
</tr>`;
});

loadConfig();
loadStatus();
}

async function saveConfig(){
if(!selectedDevice) return;
await fetch("/config/"+selectedDevice,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
mode:mode.value,
low_temp:low_temp.value,
high_temp:high_temp.value
})
});
alert("Config saved");
}

device_filter.addEventListener("change",()=>{
selectedDevice=device_filter.value;
loadData();
});

(async()=>{
await loadDevices();
await loadData();
setInterval(loadData,3000);
setInterval(loadDevices,10000);
})();
</script>
</body>
</html>
